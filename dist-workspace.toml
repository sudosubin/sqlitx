[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
cargo-dist-version = "0.30.3"
ci = "github"
installers = []
publish-jobs = ["./publish-crate"]
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Grant the nested publish-crate workflow the permissions it requests.
# id-token: OIDC trusted publishing token. contents: actions/checkout.
github-custom-job-permissions = { "publish-crate" = { id-token = "write", contents = "read" } }
